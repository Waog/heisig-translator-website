<div class="container">
  <app-input-text
    (userInputChange)="onUserInputChange($event)"
  ></app-input-text>

  <app-sentence-translation
    [userInput]="userInput"
    targetLang="en-US"
  ></app-sentence-translation>
  <app-sentence-translation
    [userInput]="userInput"
    targetLang="de-DE"
  ></app-sentence-translation>
  <app-segmentation
    [userInput]="userInput"
    (wordSelected)="onWordSelected($event)"
    [selectedWord]="selectedWord"
  ></app-segmentation>
  <app-word-details
    *ngIf="selectedWord"
    [wordHanzi]="selectedWord"
  ></app-word-details>

  <app-local-storage></app-local-storage>

  <!-- Add the new button here -->
  <button (click)="shareToAnkiDroid()" class="anki-share-button">
    Add Example Card to AnkiDroid
  </button>
  <a
    href="intent:#Intent;action=android.intent.action.SEND;type=text/plain;S.subject=Test%20Note;S.text=This%20is%20a%20test%20note.;end;"
  >
    Click here to add a note to AnkiDroid
  </a>
</div>
